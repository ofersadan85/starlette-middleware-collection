name: CI and Publish

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install project dependencies
        run: uv sync --all-groups

      - name: Install tools (ruff and ty)
        run: |
            uv tool install ruff
            uv tool install ty

      - name: Ruff check
        run: uv tool run ruff check --output-format=github

      - name: Ty check
        run: uv tool run ty check --output-format=github

      - name: Run tests
        run: uv run pytest -q

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
